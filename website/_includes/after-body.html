<script>
  (function () {
    function initGlobalRouteBand() {
      return;
    }

    function initSectionNavigation() {
      const links = Array.from(
        document.querySelectorAll(
          ".anchor-nav a[href^='#'], .section-rail-nav a[href^='#']"
        )
      ).filter(function (link) {
        const hash = link.getAttribute("href");
        return hash && hash.length > 1 && document.querySelector(hash);
      });

      if (!links.length) {
        return;
      }

      const targetMap = new Map();

      links.forEach(function (link) {
        const hash = link.getAttribute("href");
        if (!targetMap.has(hash)) {
          targetMap.set(hash, document.querySelector(hash));
        }
      });

      const targets = Array.from(targetMap.entries())
        .map(function (entry) {
          return {
            hash: entry[0],
            element: entry[1]
          };
        })
        .filter(function (item) {
          return item.element;
        });

      if (!targets.length) {
        return;
      }

      let activeHash = "";
      let ticking = false;

      function setActive(hash, options) {
        const nextHash = hash || targets[0].hash;
        if (activeHash === nextHash && !(options && options.force)) {
          return;
        }

        activeHash = nextHash;

        links.forEach(function (link) {
          const isActive = link.getAttribute("href") === nextHash;
          link.classList.toggle("is-active", isActive);
          if (isActive) {
            link.setAttribute("aria-current", "location");
          } else {
            link.removeAttribute("aria-current");
          }
        });

        if (options && options.scrollIntoView) {
          links.forEach(function (link) {
            if (link.getAttribute("href") !== nextHash) {
              return;
            }
            const nav = link.closest(".anchor-nav, .section-rail-nav");
            if (nav && nav.scrollWidth > nav.clientWidth + 8) {
              link.scrollIntoView({
                behavior: "smooth",
                block: "nearest",
                inline: "center"
              });
            }
          });
        }
      }

      function detectActiveHash() {
        const offset = window.scrollY + 176;
        let currentHash = targets[0].hash;

        targets.forEach(function (target) {
          const top = target.element.getBoundingClientRect().top + window.scrollY;
          if (top <= offset) {
            currentHash = target.hash;
          }
        });

        if (
          window.innerHeight + window.scrollY >=
          document.documentElement.scrollHeight - 120
        ) {
          currentHash = targets[targets.length - 1].hash;
        }

        setActive(currentHash);
      }

      function requestUpdate() {
        if (ticking) {
          return;
        }

        ticking = true;
        window.requestAnimationFrame(function () {
          detectActiveHash();
          ticking = false;
        });
      }

      links.forEach(function (link) {
        link.addEventListener("click", function () {
          setActive(link.getAttribute("href"), {
            force: true,
            scrollIntoView: true
          });
        });
      });

      window.addEventListener("scroll", requestUpdate, { passive: true });
      window.addEventListener("resize", requestUpdate);
      window.addEventListener("hashchange", requestUpdate);

      requestUpdate();
    }

    function initTableRegions() {
      const shells = Array.from(document.querySelectorAll(".table-shell"));

      if (!shells.length) {
        return;
      }

      function normalizeLabel(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function resolveTableLabel(shell) {
        const section = shell.closest("section");
        if (section) {
          const heading = section.querySelector(":scope > h2, :scope > h3");
          if (heading) {
            const label = normalizeLabel(heading.textContent);
            if (label) {
              return label;
            }
          }
        }

        let node = shell.previousElementSibling;
        while (node) {
          if (/^H[1-6]$/.test(node.tagName)) {
            const label = normalizeLabel(node.textContent);
            if (label) {
              return label;
            }
          }
          node = node.previousElementSibling;
        }

        return "データ表";
      }

      shells.forEach(function (shell) {
        const existingRegion = shell.querySelector(":scope > .table-scroll-region");
        const widget = existingRegion
          ? existingRegion.querySelector(":scope > .reactable")
          : shell.querySelector(":scope > .reactable");

        if (!widget) {
          return;
        }

        let meta = shell.querySelector(":scope > .table-scroll-meta");
        if (!meta) {
          meta = document.createElement("div");
          meta.className = "table-scroll-meta";
          meta.hidden = true;

          const hint = document.createElement("span");
          hint.className = "table-scroll-hint";
          hint.textContent = "左右にスクロール";

          meta.appendChild(hint);
          shell.insertBefore(meta, shell.firstChild);
        }

        const hint = meta.querySelector(".table-scroll-hint");

        let region = existingRegion;
        if (!region) {
          region = document.createElement("div");
          region.className = "table-scroll-region";
          widget.parentNode.insertBefore(region, widget);
          region.appendChild(widget);
        }

        const label = resolveTableLabel(shell);
        let framePending = false;

        function updateScrollableState() {
          const scrollable = region.scrollWidth > region.clientWidth + 12;
          const atStart = region.scrollLeft <= 4;
          const atEnd =
            region.scrollLeft + region.clientWidth >= region.scrollWidth - 4;

          shell.classList.toggle("is-scrollable", scrollable);
          shell.classList.toggle("is-scrolled-start", atStart);
          shell.classList.toggle("is-scrolled-end", atEnd);
          meta.hidden = !scrollable;

          if (scrollable) {
            region.tabIndex = 0;
            region.setAttribute("role", "region");
            region.setAttribute(
              "aria-label",
              label + " の表。左右にスクロールできます。"
            );
            if (hint) {
              hint.textContent = atEnd ? "表の右端です" : "左右にスクロール";
            }
          } else {
            region.removeAttribute("tabindex");
            region.removeAttribute("role");
            region.removeAttribute("aria-label");
            shell.classList.remove("is-scrolled-start", "is-scrolled-end");
            if (hint) {
              hint.textContent = "左右にスクロール";
            }
          }
        }

        function queueUpdate() {
          if (framePending) {
            return;
          }

          framePending = true;
          window.requestAnimationFrame(function () {
            updateScrollableState();
            framePending = false;
          });
        }

        if (!region.dataset.cbrTableBound) {
          region.dataset.cbrTableBound = "true";

          region.addEventListener("scroll", queueUpdate, { passive: true });
          region.addEventListener("keydown", function (event) {
            if (!shell.classList.contains("is-scrollable")) {
              return;
            }

            let nextLeft = null;

            if (event.key === "ArrowRight") {
              nextLeft = region.scrollLeft + 120;
            } else if (event.key === "ArrowLeft") {
              nextLeft = region.scrollLeft - 120;
            } else if (event.key === "End") {
              nextLeft = region.scrollWidth;
            } else if (event.key === "Home") {
              nextLeft = 0;
            }

            if (nextLeft === null) {
              return;
            }

            event.preventDefault();
            region.scrollTo({
              left: nextLeft,
              behavior: "smooth"
            });
          });

          if (typeof MutationObserver === "function") {
            const observer = new MutationObserver(queueUpdate);
            observer.observe(region, {
              childList: true,
              subtree: true,
              attributes: true
            });
          }

          if (typeof ResizeObserver === "function") {
            const resizeObserver = new ResizeObserver(queueUpdate);
            resizeObserver.observe(region);
            resizeObserver.observe(widget);
          } else {
            window.addEventListener("resize", queueUpdate);
          }
        }

        queueUpdate();
        window.setTimeout(queueUpdate, 240);
        window.setTimeout(queueUpdate, 1000);
      });
    }

    function initCompareTableRegions() {
      const shells = Array.from(document.querySelectorAll(".compare-table-shell"));

      if (!shells.length) {
        return;
      }

      function normalizeLabel(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function resolveTableLabel(shell) {
        const title = shell.querySelector(":scope > .compare-table-head .compare-table-title");
        if (title) {
          const directLabel = normalizeLabel(title.textContent);
          if (directLabel) {
            return directLabel;
          }
        }

        const section = shell.closest("section");
        if (section) {
          const heading = section.querySelector(":scope > h2, :scope > h3");
          if (heading) {
            const sectionLabel = normalizeLabel(heading.textContent);
            if (sectionLabel) {
              return sectionLabel;
            }
          }
        }

        let node = shell.previousElementSibling;
        while (node) {
          if (/^H[1-6]$/.test(node.tagName)) {
            const label = normalizeLabel(node.textContent);
            if (label) {
              return label;
            }
          }
          node = node.previousElementSibling;
        }

        return "比較表";
      }

      shells.forEach(function (shell) {
        let meta = shell.querySelector(":scope > .table-scroll-meta");
        if (!meta) {
          meta = document.createElement("div");
          meta.className = "table-scroll-meta";
          meta.hidden = true;

          const hint = document.createElement("span");
          hint.className = "table-scroll-hint";
          hint.textContent = "左右にスクロール";

          meta.appendChild(hint);
          shell.insertBefore(meta, shell.firstChild);
        }

        const hint = meta.querySelector(".table-scroll-hint");
        let framePending = false;

        function updateScrollableState() {
          const region = shell.querySelector(":scope > .compare-table-region");

          if (!region) {
            meta.hidden = true;
            shell.classList.remove("is-scrollable", "is-scrolled-start", "is-scrolled-end");
            return;
          }

          const scrollable = region.scrollWidth > region.clientWidth + 12;
          const atStart = region.scrollLeft <= 4;
          const atEnd =
            region.scrollLeft + region.clientWidth >= region.scrollWidth - 4;
          const label = resolveTableLabel(shell);

          shell.classList.toggle("is-scrollable", scrollable);
          shell.classList.toggle("is-scrolled-start", atStart);
          shell.classList.toggle("is-scrolled-end", atEnd);
          meta.hidden = !scrollable;

          if (scrollable) {
            region.tabIndex = 0;
            region.setAttribute("role", "region");
            region.setAttribute(
              "aria-label",
              label + " の表。左右にスクロールできます。"
            );
            if (hint) {
              hint.textContent = atEnd ? "表の右端です" : "左右にスクロール";
            }
          } else {
            region.removeAttribute("tabindex");
            region.removeAttribute("role");
            region.removeAttribute("aria-label");
            if (hint) {
              hint.textContent = "左右にスクロール";
            }
          }
        }

        function queueUpdate() {
          if (framePending) {
            return;
          }

          framePending = true;
          window.requestAnimationFrame(function () {
            updateScrollableState();
            framePending = false;
          });
        }

        function bindRegion(region) {
          if (!region || region.dataset.cbrCompareTableBound === "true") {
            return;
          }

          region.dataset.cbrCompareTableBound = "true";
          region.addEventListener("scroll", queueUpdate, { passive: true });
          region.addEventListener("keydown", function (event) {
            if (!shell.classList.contains("is-scrollable")) {
              return;
            }

            let nextLeft = null;

            if (event.key === "ArrowRight") {
              nextLeft = region.scrollLeft + 120;
            } else if (event.key === "ArrowLeft") {
              nextLeft = region.scrollLeft - 120;
            } else if (event.key === "End") {
              nextLeft = region.scrollWidth;
            } else if (event.key === "Home") {
              nextLeft = 0;
            }

            if (nextLeft === null) {
              return;
            }

            event.preventDefault();
            region.scrollTo({
              left: nextLeft,
              behavior: "smooth"
            });
          });

          if (typeof ResizeObserver === "function") {
            const resizeObserver = new ResizeObserver(queueUpdate);
            resizeObserver.observe(region);

            const table = region.querySelector("table");
            if (table) {
              resizeObserver.observe(table);
            }
          } else {
            window.addEventListener("resize", queueUpdate);
          }
        }

        if (!shell.dataset.cbrCompareShellObserved) {
          shell.dataset.cbrCompareShellObserved = "true";

          if (typeof MutationObserver === "function") {
            const observer = new MutationObserver(function () {
              bindRegion(shell.querySelector(":scope > .compare-table-region"));
              queueUpdate();
            });

            observer.observe(shell, {
              childList: true,
              subtree: true,
              attributes: true
            });
          }
        }

        bindRegion(shell.querySelector(":scope > .compare-table-region"));
        queueUpdate();
        window.setTimeout(queueUpdate, 240);
        window.setTimeout(queueUpdate, 1000);
      });
    }

    function initPageChrome() {
      initGlobalRouteBand();
      initSectionNavigation();
      initTableRegions();
      initCompareTableRegions();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initPageChrome);
    } else {
      initPageChrome();
    }

    window.addEventListener("load", initTableRegions);
    window.addEventListener("load", initCompareTableRegions);
  })();
</script>
