name: Build & Publish

on:
  push:
    branches: [main]
  schedule:
    # 毎日 JST 7:00 (UTC 22:00) に自動更新
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"
          use-public-rspm: true

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            tidyverse
            rvest
            httr2
            readxl
            readr
            lubridate
            glue
            fs
            plotly
            reactable
            htmltools
            scales
            quarto

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Scrape latest data
        run: Rscript 01_Code/04_big6_scraping.R
        working-directory: ${{ github.workspace }}

      - name: Compute ratings
        run: Rscript 01_Code/05_rating_model.R
        working-directory: ${{ github.workspace }}

      - name: Render Quarto website
        run: quarto render
        working-directory: ${{ github.workspace }}/website

      - name: Generate individual pages
        run: Rscript generate_pages.R
        working-directory: ${{ github.workspace }}/website

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
